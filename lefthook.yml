pre-commit:
  parallel: true
  commands:
    format:
      run: pnpm format {staged_files}
      glob: '*.{js,jsx,mjs,ts,tsx,css,json,md}'
      stage_fixed: true

    lint:
      run: pnpm lint {staged_files}
      glob: '*.{ts,tsx}'
      stage_fixed: true

pre-push:
  commands:
    test:
      run: pnpm test
